name: Notification Workflow

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'GitHub Actions CI Notification'
          body: |
            CI Workflow Completed!

            Java build status: ${{ github.event.workflow_run.conclusion == 'success' && '✅ Success' || '❌ Failed' }}
            JavaScript build status: ${{ github.event.workflow_run.conclusion == 'success' && '✅ Success' || '❌ Failed' }}
            Python build status: ${{ github.event.workflow_run.conclusion == 'success' && '✅ Success' || '❌ Failed' }}

            More details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
